
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PDF Coordinate Tester — Lite</title>
  <style>
    :root { --ink:#0f172a; --muted:#475569; --accent:#2563eb; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; color: var(--ink); }
    header { position: sticky; top:0; background:white; border-bottom:1px solid #e5e7eb; padding:12px 16px; z-index:5; }
    header h1 { margin:0 0 4px 0; font-size:18px; }
    header .row { display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
    .pill { display:inline-block; padding:2px 8px; background:#eef2ff; color:#3730a3; border-radius:999px; font-size:12px; }
    .kv { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    main { padding:16px; }
    .panel { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:12px; }
    .card { border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.03); }
    label { font-weight: 600; font-size:14px; display:block; margin-bottom:6px; color: var(--muted); }
    input[type="number"], input[type="file"] { padding: 6px 8px; border:1px solid #cbd5e1; border-radius: 8px; min-width: 140px; }
    button { padding:8px 12px; border:0; border-radius:10px; cursor:pointer; background:var(--accent); color:white; }
    #msg { margin-left:auto; color:#b91c1c; font-weight:600; }
    #canvas { border:1px solid #cbd5e1; max-width:100%; height:auto; cursor:crosshair; touch-action:none; }
    #coords { font-weight:700; }
  </style>
</head>
<body>
  <header>
    <h1>PDF Coordinate Tester — <span class="pill">click to get x,y (PDF units)</span></h1>
    <div class="row">
      <div id="coords" class="kv">x: — , y: —</div>
      <div id="pageinfo" class="kv">page: 1</div>
      <div id="scaleinfo" class="kv">scale: 1.5</div>
      <div id="status" class="kv" style="color:#16a34a;"></div>
      <div id="msg"></div>
    </div>
  </header>

  <main>
    <div class="panel">
      <div class="card">
        <label>PDF file</label>
        <input type="file" id="file" accept="application/pdf" />
      </div>
      <div class="card">
        <label>Page</label>
        <input type="number" id="page" value="1" min="1" step="1" />
        <button id="render" style="margin-left:8px;">Render</button>
      </div>
      <div class="card">
        <label>Scale</label>
        <input type="number" id="scale" value="1.5" min="0.1" step="0.1" />
      </div>
      <div class="card">
        <label>Rect size (for overlay preview)</label>
        <div style="display:flex; gap:8px;">
          <input type="number" id="rectW" value="120" step="1" />
          <input type="number" id="rectH" value="18" step="1" />
        </div>
      </div>
    </div>

    <canvas id="canvas"></canvas>
  </main>

  <script type="module">
    import * as pdfjsLib from "https://unpkg.com/pdfjs-dist@4.4.168/build/pdf.mjs";
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://unpkg.com/pdfjs-dist@4.4.168/build/pdf.worker.mjs";

    const fileInput   = document.getElementById('file');
    const pageInput   = document.getElementById('page');
    const scaleInput  = document.getElementById('scale');
    const canvas      = document.getElementById('canvas');
    const ctx         = canvas.getContext('2d');
    const msg         = document.getElementById('msg');
    const statusEl    = document.getElementById('status');
    const coordsEl    = document.getElementById('coords');
    const pageinfoEl  = document.getElementById('pageinfo');
    const scaleinfoEl = document.getElementById('scaleinfo');
    const rectW       = document.getElementById('rectW');
    const rectH       = document.getElementById('rectH');

    let pdfDoc = null;
    let pdfData = null;
    let currentPage = 1;
    let scale = parseFloat(scaleInput.value);
    let viewPort = null;

    const say = (e) => { console.error(e); msg.textContent = (e && e.message) ? e.message : String(e); };

    document.getElementById('render').addEventListener('click', async () => {
      try {
        if (!pdfData) return alert('Choose a PDF first.');
        currentPage = parseInt(pageInput.value, 10) || 1;
        scale       = parseFloat(scaleInput.value) || 1.5;
        await renderPage(currentPage, scale);
      } catch (e) { say(e); }
    });

    fileInput.addEventListener('change', async (e) => {
      try {
        const file = e.target.files[0];
        if (!file) return;
        pdfData = await file.arrayBuffer();
        pdfDoc = await pdfjsLib.getDocument({ data: pdfData }).promise;
        pageInput.max = pdfDoc.numPages;
        pageInput.value = 1;
        statusEl.textContent = `Loaded: ${file.name} (${pdfDoc.numPages} pages)`;
        await renderPage(1, scale);
        msg.textContent = "";
      } catch (e) { say(e); }
    });

    async function renderPage(pageNum, scale=1.5) {
      if (!pdfDoc) throw new Error('PDF not loaded yet.');
      const page = await pdfDoc.getPage(pageNum);
      viewPort   = page.getViewport({ scale });
      canvas.width  = Math.floor(viewPort.width);
      canvas.height = Math.floor(viewPort.height);
      const renderContext = { canvasContext: ctx, viewport: viewPort };
      await page.render(renderContext).promise;
      pageinfoEl.textContent  = `page: ${pageNum}`;
      scaleinfoEl.textContent = `scale: ${scale}`;
    }

    function viewToPdfCoords(viewX, viewY) {
      const sx = viewPort.transform[0];
      const sy = Math.abs(viewPort.transform[3]);
      const pdfX = viewX / sx;
      const pdfY = (viewPort.height - viewY) / sy;
      return { x: +pdfX.toFixed(2), y: +pdfY.toFixed(2) };
    }

    function drawBox(x, y) {
      const w = parseFloat(rectW.value) || 120;
      const h = parseFloat(rectH.value) || 18;
      const sx = viewPort.transform[0];
      const sy = Math.abs(viewPort.transform[3]);
      const vx = x * sx;
      const vyTop = viewPort.height - y * sy;
      ctx.save();
      ctx.strokeStyle = '#ef4444';
      ctx.lineWidth = 1;
      ctx.strokeRect(vx, vyTop - h * sy, w * sx, h * sy);
      ctx.restore();
    }

    canvas.addEventListener('pointerdown', (e) => {
      try {
        if (!viewPort) return;
        const rect = canvas.getBoundingClientRect();
        const viewX = e.clientX - rect.left;
        const viewY = e.clientY - rect.top;
        const { x, y } = viewToPdfCoords(viewX, viewY);
        coordsEl.textContent = `x: ${x} , y: ${y}`;
        drawBox(x, y);
      } catch (e) { say(e); }
    }, { passive: true });
  </script>
</body>
</html>
